# MAGI Tmux Theme 🧠📟
# High-spec Orange Primary interface for the MAGI Command Center.

# --- Colors ---
# Orange: #ec7420
# Black:  #000000
# Grey:   #484848
# Cyan:   #3cffd0

# Status Bar Base
set -g status-style "bg=#000000,fg=#ec7420"
set -g status-left-length 50
set -g status-right-length 150

# --- Messaging / Selection ---
set -g message-style "fg=#000000,bg=#ec7420,bold"
set -g mode-style "fg=#000000,bg=#3cffd0"

# --- Panes ---
set -g pane-border-style "fg=#484848"
set -g pane-active-border-style "fg=#ec7420"

# --- Status Left ---
# MAGI System Status
set -g status-left "#[fg=#000000,bg=#ec7420,bold] 🧠 MAGI #[fg=#ec7420,bg=#484848,nobold]#[fg=#e8e8e8,bg=#484848] #S #[fg=#484848,bg=#000000]"

# --- Status Right ---
# Time, Host, and System Marker
set -g status-right "#[fg=#484848,bg=#000000]#[fg=#e8e8e8,bg=#484848] %H:%M:%S #[fg=#ec7420,bg=#484848]#[fg=#000000,bg=#ec7420,bold] #H "

# --- Window Status ---
setw -g window-status-format "#[fg=#484848,bg=#000000] #I:#W "
setw -g window-status-current-format "#[fg=#000000,bg=#3cffd0,bold] #[fg=#000000,bg=#3cffd0]#I:#W #[fg=#3cffd0,bg=#000000,nobold]"

# --- Clock ---
setw -g clock-mode-colour "#ec7420"
