# EVA-01 Tmux Theme 💜💚
# High-sync Neon Green & Purple interface for Unit-01.

# --- Colors ---
# Neon Green: #8bd450
# Midnight Purple: #1d1a2f
# Muted Purple: #734f9a
# Bright Purple: #965fd4

# Status Bar Base
set -g status-style "bg=#1d1a2f,fg=#8bd450"
set -g status-left-length 50
set -g status-right-length 150

# --- Messaging / Selection ---
set -g message-style "fg=#1d1a2f,bg=#8bd450,bold"
set -g mode-style "fg=#1d1a2f,bg=#965fd4"

# --- Panes ---
set -g pane-border-style "fg=#734f9a"
set -g pane-active-border-style "fg=#8bd450"

# --- Status Left ---
set -g status-left "#[fg=#1d1a2f,bg=#8bd450,bold] 💜 EVA-01 #[fg=#8bd450,bg=#734f9a,nobold]#[fg=#e8e8e8,bg=#734f9a] #S #[fg=#734f9a,bg=#1d1a2f]"

# --- Status Right ---
set -g status-right "#[fg=#734f9a,bg=#1d1a2f]#[fg=#e8e8e8,bg=#734f9a] %H:%M:%S #[fg=#8bd450,bg=#734f9a]#[fg=#1d1a2f,bg=#8bd450,bold] #H "

# --- Window Status ---
setw -g window-status-format "#[fg=#734f9a,bg=#1d1a2f] #I:#W "
setw -g window-status-current-format "#[fg=#1d1a2f,bg=#965fd4,bold] #[fg=#1d1a2f,bg=#965fd4]#I:#W #[fg=#965fd4,bg=#1d1a2f,nobold]"

# --- Clock ---
setw -g clock-mode-colour "#8bd450"
