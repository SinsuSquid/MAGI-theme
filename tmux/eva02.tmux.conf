# EVA-02 Tmux Theme 🔴🧡
# Production Model Crimson & Orange interface for Unit-02.

# --- Colors ---
# Unit-02 Red: #ed2323
# Dark Purple: #281d2d
# Light Orange: #f99d52
# Orange: #ea8533

# Status Bar Base
set -g status-style "bg=#281d2d,fg=#ed2323"
set -g status-left-length 50
set -g status-right-length 150

# --- Messaging / Selection ---
set -g message-style "fg=#281d2d,bg=#ed2323,bold"
set -g mode-style "fg=#281d2d,bg=#ea8533"

# --- Panes ---
set -g pane-border-style "fg=#f99d52"
set -g pane-active-border-style "fg=#ed2323"

# --- Status Left ---
set -g status-left "#[fg=#281d2d,bg=#ed2323,bold] 🔴 EVA-02 #[fg=#ed2323,bg=#f99d52,nobold]#[fg=#fbe6e5,bg=#f99d52] #S #[fg=#f99d52,bg=#281d2d]"

# --- Status Right ---
set -g status-right "#[fg=#f99d52,bg=#281d2d]#[fg=#fbe6e5,bg=#f99d52] %H:%M:%S #[fg=#ed2323,bg=#f99d52]#[fg=#281d2d,bg=#ed2323,bold] #H "

# --- Window Status ---
setw -g window-status-format "#[fg=#f99d52,bg=#281d2d] #I:#W "
setw -g window-status-current-format "#[fg=#281d2d,bg=#ea8533,bold] #[fg=#281d2d,bg=#ea8533]#I:#W #[fg=#ea8533,bg=#281d2d,nobold]"

# --- Clock ---
setw -g clock-mode-colour "#ed2323"
